<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>家庭小管家</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --navy: #1b2430;
    --navy-deep: #131a24;
    --parchment: #f5efe3;
    --gold: #c9a96a;
    --clay: #b5651d;
    --sage: #6f8f5c;
    --dusty-blue: #5f7a9e;
    --ink: #2a2620;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--navy-deep);
    font-family: "Noto Sans TC", sans-serif;
    color: var(--parchment);
    min-height: 100vh;
  }
  .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--navy); }

  /* Password gate */
  .gate {
    position: fixed; inset: 0; background: var(--navy-deep);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    z-index: 100; padding: 32px;
  }
  .gate-card {
    background: var(--navy); border: 1px solid rgba(201,169,106,0.3);
    border-radius: 4px; padding: 40px 28px; width: 100%; max-width: 340px;
    text-align: center;
  }
  .gate-title {
    font-family: "Noto Serif TC", serif; font-weight: 700; font-size: 24px;
    color: var(--gold); margin-bottom: 8px; letter-spacing: 2px;
  }
  .gate-sub { font-size: 13px; color: rgba(245,239,227,0.55); margin-bottom: 28px; }
  .gate input {
    width: 100%; padding: 12px 14px; background: var(--navy-deep);
    border: 1px solid rgba(201,169,106,0.4); border-radius: 3px;
    color: var(--parchment); font-size: 16px; text-align: center;
    letter-spacing: 4px;
  }
  .gate button {
    margin-top: 16px; width: 100%; padding: 12px; background: var(--gold);
    border: none; border-radius: 3px; color: var(--navy-deep); font-weight: 700;
    font-size: 15px; cursor: pointer;
  }
  .gate-error { color: var(--clay); font-size: 13px; margin-top: 10px; height: 16px; }

  /* Header */
  .header {
    padding: 28px 20px 20px; text-align: center;
    border-bottom: 1px solid rgba(201,169,106,0.15);
  }
  .header-title {
    font-family: "Noto Serif TC", serif; font-weight: 700; font-size: 22px;
    color: var(--gold); letter-spacing: 3px;
  }
  .header-sub { font-size: 11px; color: rgba(245,239,227,0.4); margin-top: 4px; letter-spacing: 2px; }

  /* Tabs */
  .tabs { display: flex; padding: 16px 16px 0; gap: 8px; }
  .tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 14px; font-weight: 700;
    border-radius: 3px 3px 0 0; cursor: pointer; opacity: 0.5; border-bottom: 3px solid transparent;
  }
  .tab.active { opacity: 1; }
  .tab[data-k="expense"].active { border-color: var(--clay); color: var(--clay); }
  .tab[data-k="todo"].active { border-color: var(--sage); color: var(--sage); }
  .tab[data-k="note"].active { border-color: var(--dusty-blue); color: var(--dusty-blue); }

  .content { padding: 20px 16px 60px; }

  /* Summary card */
  .summary-card {
    background: rgba(201,169,106,0.06); border: 1px solid rgba(201,169,106,0.2);
    border-radius: 4px; padding: 18px; margin-bottom: 20px;
  }
  .summary-title { font-size: 12px; color: rgba(245,239,227,0.5); letter-spacing: 1px; margin-bottom: 12px; }
  .summary-total { font-family: "Noto Serif TC", serif; font-size: 28px; color: var(--clay); font-weight: 700; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; }
  .bar-label { width: 62px; flex-shrink: 0; color: rgba(245,239,227,0.75); }
  .bar-track { flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--clay); border-radius: 3px; }
  .bar-amt { width: 64px; text-align: right; color: rgba(245,239,227,0.75); flex-shrink: 0; }

  /* List items */
  .item-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px; padding: 14px 16px; margin-bottom: 10px;
  }
  .item-top { display: flex; justify-content: space-between; align-items: baseline; }
  .item-name { font-size: 15px; font-weight: 500; }
  .item-amt { font-size: 16px; font-weight: 700; color: var(--clay); }
  .item-meta { font-size: 12px; color: rgba(245,239,227,0.45); margin-top: 6px; }
  .cat-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(181,101,29,0.18); color: #d99a5b; margin-right: 6px;
  }
  .todo-item { display: flex; align-items: center; gap: 10px; }
  .todo-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--sage); flex-shrink: 0;
  }
  .todo-item.done .item-name { text-decoration: line-through; opacity: 0.4; }
  .todo-item.done .todo-dot { background: rgba(245,239,227,0.2); }
  .note-item { border-left: 3px solid var(--dusty-blue); }

  .empty-state { text-align: center; padding: 60px 20px; color: rgba(245,239,227,0.35); font-size: 14px; }
  .loading { text-align: center; padding: 60px 20px; color: rgba(245,239,227,0.35); font-size: 14px; }

  .month-select {
    background: var(--navy-deep); border: 1px solid rgba(201,169,106,0.3); color: var(--gold);
    border-radius: 3px; padding: 6px 10px; font-size: 13px; float: right; margin-top: -2px;
  }

  /* Edit / delete actions */
  .action-row { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: none; padding: 4px 6px; font-size: 15px; opacity: 0.5;
    cursor: pointer; line-height: 1;
  }
  .icon-btn:active { opacity: 1; }
  .todo-check {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--sage);
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: none; padding: 0;
  }
  .todo-check.checked { background: var(--sage); }
  .todo-check.checked::after { content: "✓"; color: var(--navy-deep); font-size: 13px; font-weight: 700; }

  .edit-form { display: flex; flex-direction: column; gap: 8px; }
  .edit-form input, .edit-form select {
    background: var(--navy-deep); border: 1px solid rgba(201,169,106,0.35); border-radius: 3px;
    color: var(--parchment); font-size: 14px; padding: 8px 10px; font-family: inherit;
  }
  .edit-form-row { display: flex; gap: 8px; }
  .edit-form-row > * { flex: 1; }
  .edit-btns { display: flex; gap: 8px; margin-top: 2px; }
  .edit-btns button {
    flex: 1; padding: 8px; border: none; border-radius: 3px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-save { background: var(--gold); color: var(--navy-deep); }
  .btn-cancel { background: rgba(255,255,255,0.08); color: var(--parchment); }

  /* Calendar */
  .calendar-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px; padding: 16px; margin-bottom: 20px;
  }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .calendar-weekday {
    text-align: center; font-size: 11px; color: rgba(245,239,227,0.4); padding-bottom: 4px;
  }
  .calendar-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 6px; font-size: 13px; color: rgba(245,239,227,0.8);
    background: rgba(255,255,255,0.025); cursor: pointer; position: relative;
  }
  .calendar-day.empty { visibility: hidden; cursor: default; }
  .calendar-day.has-data { color: var(--clay); font-weight: 700; background: rgba(181,101,29,0.14); }
  .calendar-day.selected { background: var(--clay); color: var(--navy-deep); }
  .calendar-dot {
    width: 4px; height: 4px; border-radius: 50%; background: var(--clay); margin-top: 3px;
  }
  .calendar-day.selected .calendar-dot { background: var(--navy-deep); }
  .calendar-clear {
    text-align: center; font-size: 12px; color: var(--gold); margin-top: 10px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const firebaseConfig = {
  apiKey: "AIzaSyB4n9hV4fTMI_qdJn8NxDgsZ_Uqa6cu3cs",
  authDomain: "jarvis-d45fd.firebaseapp.com",
  projectId: "jarvis-d45fd",
  storageBucket: "jarvis-d45fd.firebasestorage.app",
  messagingSenderId: "362035384532",
  appId: "1:362035384532:web:06ac499f403e86a68beb41"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const FAMILY_PASSWORD = "family1313"; // 可自行修改
const CATEGORIES = ["餐飲", "交通", "生活用品", "醫療", "娛樂", "其他"];
const CAT_COLORS = { "餐飲": "#b5651d", "交通": "#a67c3d", "生活用品": "#c9a96a", "醫療": "#8a6d3b", "娛樂": "#d99a5b", "其他": "#7d6a4f" };

function formatDate(timestamp) {
  if (!timestamp || !timestamp.toDate) return "";
  const date = timestamp.toDate();
  const wd = ["日", "一", "二", "三", "四", "五", "六"][date.getDay()];
  return `${date.getMonth() + 1}/${date.getDate()}(${wd})`;
}

function getTaipeiDay(timestamp) {
  if (!timestamp || !timestamp.toDate) return null;
  const d = new Date(timestamp.toDate().toLocaleString("en-US", { timeZone: "Asia/Taipei" }));
  return d.getDate();
}

function PasswordGate({ onUnlock }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState(false);

  const submit = () => {
    if (val === FAMILY_PASSWORD) {
      localStorage.setItem("jarvis_unlocked", "1");
      onUnlock();
    } else {
      setErr(true);
    }
  };

  return (
    <div className="gate">
      <div className="gate-card">
        <div className="gate-title">家庭小管家</div>
        <div className="gate-sub">請輸入家庭通關密語</div>
        <input
          type="password"
          value={val}
          onChange={(e) => { setVal(e.target.value); setErr(false); }}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          placeholder="••••••"
        />
        <div className="gate-error">{err ? "密語不對喔，再試一次" : ""}</div>
        <button onClick={submit}>進入</button>
      </div>
    </div>
  );
}

function useCollection(name) {
  const [data, setData] = useState(null);
  useEffect(() => {
    db.collection(name).onSnapshot((snap) => {
      const docs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      docs.sort((a, b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0));
      setData(docs);
    });
  }, [name]);
  return data;
}

function ExpenseTab() {
  const expenses = useCollection("expenses");
  const months = useMemo(() => {
    if (!expenses) return [];
    return [...new Set(expenses.map((e) => e.yearMonth))].sort().reverse();
  }, [expenses]);
  const [month, setMonth] = useState(null);
  useEffect(() => { if (!month && months.length) setMonth(months[0]); }, [months]);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ category: "", item: "", amount: "" });
  const [selectedDay, setSelectedDay] = useState(null);
  useEffect(() => { setSelectedDay(null); }, [month]);

  if (!expenses) return <div className="loading">載入中...</div>;
  if (expenses.length === 0) return <div className="empty-state">還沒有任何記帳紀錄<br/>在 LINE 群組輸入「記帳 餐飲 午餐 150」試試看</div>;

  const filtered = expenses.filter((e) => e.yearMonth === month);
  const byCategory = {};
  let total = 0;
  filtered.forEach((e) => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; total += e.amount; });
  const maxAmt = Math.max(1, ...Object.values(byCategory));

  // 萬年曆：計算本月天數與每天是否有記帳
  const [yStr, mStr] = (month || "2026-01").split("-");
  const y = parseInt(yStr, 10), m = parseInt(mStr, 10);
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstWeekday = new Date(y, m - 1, 1).getDay();
  const dayHasData = {};
  filtered.forEach((e) => {
    const d = getTaipeiDay(e.timestamp);
    if (d) dayHasData[d] = true;
  });
  const calendarCells = [
    ...Array(firstWeekday).fill(null),
    ...Array.from({ length: daysInMonth }, (_, i) => i + 1),
  ];

  const displayList = selectedDay ? filtered.filter((e) => getTaipeiDay(e.timestamp) === selectedDay) : filtered;

  const startEdit = (e) => {
    setEditingId(e.id);
    setForm({ category: e.category, item: e.item, amount: e.amount });
  };

  const saveEdit = async (id) => {
    const amount = parseFloat(form.amount);
    if (!form.item.trim() || isNaN(amount)) return;
    await db.collection("expenses").doc(id).update({
      category: form.category,
      item: form.item.trim(),
      amount,
      editedBy: "網頁",
      editedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setEditingId(null);
  };

  const remove = async (id) => {
    if (!window.confirm("確定要刪除這筆記帳嗎？")) return;
    await db.collection("expenses").doc(id).delete();
  };

  return (
    <div>
      <div className="summary-card">
        <div className="summary-title">
          {month} 支出統計
          <select className="month-select" value={month || ""} onChange={(e) => setMonth(e.target.value)}>
            {months.map((m) => <option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div className="summary-total">${total.toLocaleString()}</div>
        {Object.entries(byCategory).sort((a,b) => b[1]-a[1]).map(([cat, amt]) => (
          <div className="bar-row" key={cat}>
            <div className="bar-label">{cat}</div>
            <div className="bar-track"><div className="bar-fill" style={{width: `${(amt/maxAmt)*100}%`, background: CAT_COLORS[cat]}}></div></div>
            <div className="bar-amt">${amt.toLocaleString()}</div>
          </div>
        ))}
      </div>

      <div className="calendar-card">
        <div className="calendar-grid">
          {["日","一","二","三","四","五","六"].map((wd) => (
            <div className="calendar-weekday" key={wd}>{wd}</div>
          ))}
          {calendarCells.map((day, i) => {
            if (day === null) return <div className="calendar-day empty" key={"e"+i}></div>;
            const cls = ["calendar-day"];
            if (dayHasData[day]) cls.push("has-data");
            if (selectedDay === day) cls.push("selected");
            return (
              <div
                key={day}
                className={cls.join(" ")}
                onClick={() => setSelectedDay(selectedDay === day ? null : day)}
              >
                {day}
                {dayHasData[day] && <div className="calendar-dot"></div>}
              </div>
            );
          })}
        </div>
        {selectedDay && (
          <div className="calendar-clear" onClick={() => setSelectedDay(null)}>
            清除日期篩選（顯示整月）
          </div>
        )}
      </div>
      {displayList.map((e) => (
        <div className="item-card" key={e.id}>
          {editingId === e.id ? (
            <div className="edit-form">
              <div className="edit-form-row">
                <select value={form.category} onChange={(ev) => setForm({...form, category: ev.target.value})}>
                  {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
                </select>
                <input type="number" value={form.amount} onChange={(ev) => setForm({...form, amount: ev.target.value})} placeholder="金額" />
              </div>
              <input value={form.item} onChange={(ev) => setForm({...form, item: ev.target.value})} placeholder="項目" />
              <div className="edit-btns">
                <button className="btn-save" onClick={() => saveEdit(e.id)}>儲存</button>
                <button className="btn-cancel" onClick={() => setEditingId(null)}>取消</button>
              </div>
            </div>
          ) : (
            <React.Fragment>
              <div className="item-top">
                <div className="item-name">{e.item}</div>
                <div style={{display:"flex", alignItems:"center", gap:8}}>
                  <div className="item-amt">${e.amount.toLocaleString()}</div>
                  <div className="action-row">
                    <button className="icon-btn" onClick={() => startEdit(e)}>✏️</button>
                    <button className="icon-btn" onClick={() => remove(e.id)}>🗑️</button>
                  </div>
                </div>
              </div>
              <div className="item-meta"><span className="cat-tag">{e.category}</span>{e.sender} · {formatDate(e.timestamp)}</div>
            </React.Fragment>
          )}
        </div>
      ))}
    </div>
  );
}

function TodoTab() {
  const todos = useCollection("todos");
  const [editingId, setEditingId] = useState(null);
  const [content, setContent] = useState("");

  if (!todos) return <div className="loading">載入中...</div>;
  if (todos.length === 0) return <div className="empty-state">還沒有待辦事項<br/>在 LINE 群組輸入「待辦 買尿布」試試看</div>;

  const undone = todos.filter((t) => !t.done);
  const done = todos.filter((t) => t.done);

  const toggle = async (t) => {
    await db.collection("todos").doc(t.id).update({
      done: !t.done,
      doneBy: !t.done ? "網頁" : null,
      doneAt: !t.done ? firebase.firestore.FieldValue.serverTimestamp() : null,
    });
  };

  const startEdit = (t) => { setEditingId(t.id); setContent(t.content); };

  const saveEdit = async (id) => {
    if (!content.trim()) return;
    await db.collection("todos").doc(id).update({
      content: content.trim(),
      editedBy: "網頁",
      editedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setEditingId(null);
  };

  const remove = async (id) => {
    if (!window.confirm("確定要刪除這筆待辦嗎？")) return;
    await db.collection("todos").doc(id).delete();
  };

  const renderItem = (t) => (
    <div className={`item-card todo-item ${t.done ? "done" : ""}`} key={t.id}>
      {editingId === t.id ? (
        <div className="edit-form" style={{flex:1}}>
          <input value={content} onChange={(e) => setContent(e.target.value)} placeholder="待辦內容" />
          <div className="edit-btns">
            <button className="btn-save" onClick={() => saveEdit(t.id)}>儲存</button>
            <button className="btn-cancel" onClick={() => setEditingId(null)}>取消</button>
          </div>
        </div>
      ) : (
        <React.Fragment>
          <button className={`todo-check ${t.done ? "checked" : ""}`} onClick={() => toggle(t)}></button>
          <div style={{flex:1}}>
            <div className="item-name">{t.content}</div>
            <div className="item-meta">{t.done ? `${t.sender} → ${t.doneBy || ""} 完成` : t.sender}</div>
          </div>
          <div className="action-row">
            <button className="icon-btn" onClick={() => startEdit(t)}>✏️</button>
            <button className="icon-btn" onClick={() => remove(t.id)}>🗑️</button>
          </div>
        </React.Fragment>
      )}
    </div>
  );

  return (
    <div>
      {undone.map(renderItem)}
      {done.length > 0 && <div className="summary-title" style={{margin:"20px 0 10px"}}>已完成</div>}
      {done.map(renderItem)}
    </div>
  );
}

function NoteTab() {
  const notes = useCollection("notes");
  const [editingId, setEditingId] = useState(null);
  const [content, setContent] = useState("");

  if (!notes) return <div className="loading">載入中...</div>;
  if (notes.length === 0) return <div className="empty-state">還沒有備忘紀錄<br/>在 LINE 群組輸入「備忘 週日阿嬤生日」試試看</div>;

  const startEdit = (n) => { setEditingId(n.id); setContent(n.content); };

  const saveEdit = async (id) => {
    if (!content.trim()) return;
    await db.collection("notes").doc(id).update({
      content: content.trim(),
      editedBy: "網頁",
      editedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setEditingId(null);
  };

  const remove = async (id) => {
    if (!window.confirm("確定要刪除這筆備忘嗎？")) return;
    await db.collection("notes").doc(id).delete();
  };

  return (
    <div>
      {notes.map((n) => (
        <div className="item-card note-item" key={n.id}>
          {editingId === n.id ? (
            <div className="edit-form">
              <input value={content} onChange={(e) => setContent(e.target.value)} placeholder="備忘內容" />
              <div className="edit-btns">
                <button className="btn-save" onClick={() => saveEdit(n.id)}>儲存</button>
                <button className="btn-cancel" onClick={() => setEditingId(null)}>取消</button>
              </div>
            </div>
          ) : (
            <div className="item-top">
              <div style={{flex:1}}>
                <div className="item-name">{n.content}</div>
                <div className="item-meta">{n.sender} · {formatDate(n.timestamp)}</div>
              </div>
              <div className="action-row">
                <button className="icon-btn" onClick={() => startEdit(n)}>✏️</button>
                <button className="icon-btn" onClick={() => remove(n.id)}>🗑️</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [unlocked, setUnlocked] = useState(localStorage.getItem("jarvis_unlocked") === "1");
  const [tab, setTab] = useState("expense");

  if (!unlocked) return <PasswordGate onUnlock={() => setUnlocked(true)} />;

  return (
    <div className="app-container">
      <div className="header">
        <div className="header-title">家庭小管家</div>
        <div className="header-sub">JARVIS · HOUSEHOLD LEDGER</div>
      </div>
      <div className="tabs">
        <div className={`tab ${tab==="expense"?"active":""}`} data-k="expense" onClick={() => setTab("expense")}>記帳</div>
        <div className={`tab ${tab==="todo"?"active":""}`} data-k="todo" onClick={() => setTab("todo")}>待辦</div>
        <div className={`tab ${tab==="note"?"active":""}`} data-k="note" onClick={() => setTab("note")}>備忘</div>
      </div>
      <div className="content">
        {tab === "expense" && <ExpenseTab />}
        {tab === "todo" && <TodoTab />}
        {tab === "note" && <NoteTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
